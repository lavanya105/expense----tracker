<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Expense Tracker</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

  <h1>Expense Tracker 💰</h1>

  <div class="summary">

    <div>
      <h3>Income</h3>
      <p id="income">₹0</p>
    </div>

    <div>
      <h3>Expense</h3>
      <p id="expense">₹0</p>
    </div>

    <div>
      <h3>Balance</h3>
      <p id="balance">₹0</p>
    </div>

  </div>

  <div class="form">

    <input type="text"
    id="text"
    placeholder="Enter title">

    <input type="number"
    id="amount"
    placeholder="Enter amount">

    <select id="type">

      <option value="income">
      Income
      </option>

      <option value="expense">
      Expense
      </option>

    </select>

    <button onclick="addTransaction()">
    Add
    </button>

  </div>

  <ul id="list"></ul>

  <canvas id="myChart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
